<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VM 2026 — Vennekonkurransen</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;color:#1a1a1a;background:#f5f5f0;min-height:100vh}
.container{max-width:780px;margin:0 auto;padding:1rem}
.tabs{display:flex;gap:0;border-bottom:1px solid #e0e0e0;margin-bottom:1.5rem;overflow-x:auto;background:#fff;border-radius:12px 12px 0 0;padding:0 1rem}
.tab{padding:12px 18px;cursor:pointer;font-size:14px;color:#666;border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s}
.tab.active{color:#1a1a1a;border-bottom:2px solid #1a1a1a;font-weight:500}
.tab:hover{color:#1a1a1a}
.page{display:none}.page.active{display:block}
h2{font-size:18px;font-weight:500;margin-bottom:1rem}
h3{font-size:15px;font-weight:500;margin-bottom:.75rem;color:#555}
.card{background:#fff;border:0.5px solid #e0e0e0;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem}
.q-item{padding:12px 0;border-bottom:0.5px solid #eee}
.q-item:last-child{border-bottom:none}
.q-pts{font-size:12px;font-weight:500;color:#1855a3;background:#e8f0fe;padding:2px 8px;border-radius:6px;display:inline-block}
.q-input input{width:100%;padding:8px 10px;border:0.5px solid #ccc;border-radius:8px;font-size:14px;margin-top:6px}
.q-input input:focus{outline:2px solid #1855a3;border-color:transparent}
.group-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(310px,1fr));gap:1rem;margin-bottom:1rem}
.group-card{background:#fff;border:0.5px solid #e0e0e0;border-radius:12px;padding:1rem}
.group-title{font-size:12px;font-weight:500;color:#888;margin-bottom:.75rem;text-transform:uppercase;letter-spacing:.05em}
.match-row{display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:0.5px solid #f0f0f0;font-size:13px}
.match-row:last-child{border-bottom:none}
.team{flex:1;text-align:center;font-size:12px;line-height:1.3}
.team.norway{font-weight:600;color:#003087}
.score-box{display:flex;gap:4px;align-items:center;flex-shrink:0}
.score-box input{width:38px;text-align:center;padding:5px 4px;border:0.5px solid #ccc;border-radius:6px;font-size:13px}
.score-box input:focus{outline:2px solid #1855a3}
.sep{color:#bbb;font-size:12px}
.btn{padding:9px 16px;border:0.5px solid #ccc;border-radius:8px;cursor:pointer;font-size:13px;background:#fff;color:#1a1a1a;font-weight:500;transition:all .15s}
.btn:hover{background:#f5f5f5}
.btn:active{transform:scale(.98)}
.btn.primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn.primary:hover{background:#333}
.btn.success{background:#1a7a4a;color:#fff;border-color:#1a7a4a}
.btn.danger{color:#c0392b;border-color:#f0c0bb}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;align-items:center}
.lb-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:0.5px solid #eee}
.lb-row:last-child{border-bottom:none}
.lb-rank{width:32px;font-weight:500;font-size:18px;text-align:center}
.lb-name{flex:1;font-weight:500}
.lb-pts{font-weight:500;font-size:18px}
.lb-detail{font-size:12px;color:#888;margin-top:2px}
.avatar{width:38px;height:38px;border-radius:50%;background:#e8f0fe;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;color:#1855a3;flex-shrink:0}
.notice{background:#fff8e1;border:0.5px solid #f0c040;color:#7a5800;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:1rem}
.stage-header{font-size:14px;font-weight:500;background:#f5f5f0;padding:8px 12px;border-radius:8px;margin:1.25rem 0 .75rem}
.ko-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1rem;margin-bottom:1rem}
.ko-match{background:#fff;border:0.5px solid #e0e0e0;border-radius:12px;padding:.75rem 1rem}
.ko-label{font-size:11px;color:#aaa;margin-bottom:6px}
.ko-teams{display:flex;align-items:center;gap:8px;font-size:13px}
select{padding:8px 10px;border:0.5px solid #ccc;border-radius:8px;font-size:13px;background:#fff;cursor:pointer}
.hero{text-align:center;padding:2rem 1rem 1.5rem;background:#fff;border-radius:12px;margin-bottom:1.5rem;border:0.5px solid #e0e0e0}
.hero h1{font-size:24px;font-weight:500;margin-bottom:.5rem}
.hero p{font-size:14px;color:#777}
.deadline-badge{font-size:12px;background:#fce8e8;color:#b71c1c;border-radius:6px;padding:3px 8px;display:inline-block;margin-top:6px}
.new-user-form{background:#fff;border-radius:12px;border:0.5px solid #e0e0e0;padding:1.5rem;margin-bottom:1.5rem}
.new-user-form .field{display:flex;gap:8px;flex-wrap:wrap;margin-top:1rem}
.new-user-form .field input{flex:1;min-width:160px;padding:8px 12px;border:0.5px solid #ccc;border-radius:8px;font-size:14px}
.user-bar{display:flex;align-items:center;gap:10px;margin-bottom:1rem;padding:10px 14px;background:#fff;border-radius:8px;border:0.5px solid #e0e0e0}
.pts-bar{height:5px;background:#eee;border-radius:3px;width:100%;margin-top:6px}
.pts-bar-fill{height:5px;background:#1a1a1a;border-radius:3px;transition:width .5s}
.toast{position:fixed;bottom:24px;right:24px;z-index:999;background:#1a7a4a;color:#fff;border-radius:10px;padding:12px 18px;font-size:14px;font-weight:500;box-shadow:0 4px 12px rgba(0,0,0,.2);animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid #ccc;border-top-color:#1a1a1a;border-radius:50%;animation:spin .6s linear infinite;vertical-align:-3px;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.badge-norway{background:#003087;color:#fff;font-size:10px;padding:1px 5px;border-radius:4px;margin-left:4px;vertical-align:middle}
table.rules-table{width:100%;border-collapse:collapse;font-size:14px}
table.rules-table tr{border-bottom:0.5px solid #eee}
table.rules-table tr:last-child{border-bottom:none}
table.rules-table td{padding:9px 0}
table.rules-table td:last-child{text-align:right;font-weight:500;color:#1855a3}
.config-warning{background:#fff3cd;border:1px solid #ffc107;border-radius:10px;padding:1.25rem;margin-bottom:1.5rem;font-size:14px;line-height:1.6}
.config-warning strong{display:block;font-size:15px;margin-bottom:.5rem}
.config-warning code{background:#eee;border-radius:4px;padding:2px 6px;font-size:13px;font-family:monospace}
@media(max-width:520px){.group-grid{grid-template-columns:1fr}.ko-grid{grid-template-columns:1fr}.btn-row{gap:6px}.hero h1{font-size:20px}}
</style>
</head>
<body>
<div class="container">

<!-- =====================================================
     FIREBASE KONFIGURASJON
     Bytt ut verdiene nedenfor med din egen Firebase config.
     Finn den i Firebase Console → Project settings → Your apps
     ===================================================== -->
<script>
const FIREBASE_CONFIG = {
  apiKey: "DIN_API_KEY",
  authDomain: "DIN_AUTH_DOMAIN",
  projectId: "DITT_PROJECT_ID",
  storageBucket: "DIN_STORAGE_BUCKET",
  messagingSenderId: "DIN_SENDER_ID",
  appId: "DIN_APP_ID"
};
</script>
<!-- ===================================================== -->

<div id="app">
  <div class="hero">
    <div style="font-size:32px;margin-bottom:10px">⚽</div>
    <h1>VM 2026 — Vennekonkurransen</h1>
    <p>USA · Canada · Mexico &nbsp;|&nbsp; 11. juni – 19. juli 2026</p>
    <div class="deadline-badge">Fristen for å tippe er ved kampstart!</div>
  </div>
  <div id="config-warning-section"></div>
  <div id="user-section"></div>
  <div class="tabs" id="main-tabs" style="display:none">
    <div class="tab active" onclick="showTab('predictions')">⭐ Mine tips</div>
    <div class="tab" onclick="showTab('matches')">📅 Kampene</div>
    <div class="tab" onclick="showTab('leaderboard')">🏆 Ledertavle</div>
    <div class="tab" onclick="showTab('rules')">📋 Regler</div>
  </div>
  <div id="tab-content"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
const GROUPS = {
  'A': ['USA','Panama','Honduras','Jamaica'],
  'B': ['Mexico','Ecuador','Uruguay','Canada'],
  'C': ['Argentina','Chile','Peru','Bolivia'],
  'D': ['Brasil','Colombia','Venezuela','Paraguay'],
  'E': ['England','Nederland','Polen','Senegal'],
  'F': ['Frankrike','Marokko','Algerie','Sør-Korea'],
  'G': ['Spania','Kroatia','Albania','Kamerun'],
  'H': ['Tyskland','Portugal','Tyrkia','Japan'],
  'I': ['Norge','Danmark','Skottland','Saudi-Arabia'],
  'J': ['Belgia','Polen','Ungarn','Nigeria'],
  'K': ['Italia','Sveits','Østerrike','Kamerun'],
  'L': ['Sverige','Tsjekkia','Egypt','Australia']
};

const SPECIAL_QS = [
  {id:'winner',     label:'Hvilket lag vinner VM?',                  pts:200, placeholder:'F.eks. Brasil',          type:'text'},
  {id:'finalist',   label:'Hvem taper i finalen?',                   pts:100, placeholder:'F.eks. Frankrike',       type:'text'},
  {id:'norway_first', label:'Hvem scorer Norges første mål i VM?',  pts:100, placeholder:'F.eks. Erling Haaland', type:'text'},
  {id:'norway_goals', label:'Hvor mange mål scorer Norge totalt?',  pts:100, placeholder:'F.eks. 8',               type:'number'},
  {id:'norway_top',   label:'Hvem blir Norges toppscorer i VM?',    pts:50,  placeholder:'F.eks. Erling Haaland', type:'text'}
];

let db = null;
let currentUser = null;
let allMatches = [];
let currentTab = 'predictions';
let firestoreOk = false;

function isFirebaseConfigured() {
  return FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.apiKey !== 'DIN_API_KEY';
}

function initFirebase() {
  if (!isFirebaseConfigured()) {
    document.getElementById('config-warning-section').innerHTML = `
      <div class="config-warning">
        <strong>⚠️ Firebase ikke konfigurert enda</strong>
        Siden kjører i <strong>demo-modus</strong> (tips lagres kun lokalt på din enhet).<br>
        For å samle tips fra alle vennene dine må du:<br>
        1. Opprett et gratis Firebase-prosjekt på <a href="https://firebase.google.com" target="_blank">firebase.google.com</a><br>
        2. Kopier din <code>firebaseConfig</code> inn øverst i HTML-filen (der det står DIN_API_KEY osv.)<br>
        3. Last opp filen på nytt til GitHub
      </div>`;
    return;
  }
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.firestore();
    firestoreOk = true;
  } catch(e) {
    console.error('Firebase init feil:', e);
  }
}

function genMatches() {
  allMatches = [];
  Object.entries(GROUPS).forEach(([g, teams]) => {
    for(let i=0;i<teams.length;i++) for(let j=i+1;j<teams.length;j++) {
      allMatches.push({id:`g_${g}_${i}_${j}`, stage:'group', group:g, home:teams[i], away:teams[j]});
    }
  });
  const ko = [
    {id:'r32_1', stage:'r32', label:'Åttedelsfinale 1', home:'1A', away:'2B'},
    {id:'r32_2', stage:'r32', label:'Åttedelsfinale 2', home:'1C', away:'2D'},
    {id:'r32_3', stage:'r32', label:'Åttedelsfinale 3', home:'1E', away:'2F'},
    {id:'r32_4', stage:'r32', label:'Åttedelsfinale 4', home:'1G', away:'2H'},
    {id:'r32_5', stage:'r32', label:'Åttedelsfinale 5', home:'1I', away:'2J'},
    {id:'r32_6', stage:'r32', label:'Åttedelsfinale 6', home:'1K', away:'2L'},
    {id:'r32_7', stage:'r32', label:'Åttedelsfinale 7', home:'2A', away:'1B'},
    {id:'r32_8', stage:'r32', label:'Åttedelsfinale 8', home:'2C', away:'1D'},
    {id:'r32_9', stage:'r32', label:'Åttedelsfinale 9', home:'2E', away:'1F'},
    {id:'r32_10',stage:'r32', label:'Åttedelsfinale 10',home:'2G', away:'1H'},
    {id:'r32_11',stage:'r32', label:'Åttedelsfinale 11',home:'2I', away:'1J'},
    {id:'r32_12',stage:'r32', label:'Åttedelsfinale 12',home:'2K', away:'1L'},
    {id:'r32_13',stage:'r32', label:'Åttedelsfinale 13',home:'3A/B/C', away:'3D/E/F'},
    {id:'r32_14',stage:'r32', label:'Åttedelsfinale 14',home:'3G/H/I', away:'3J/K/L'},
    {id:'r32_15',stage:'r32', label:'Åttedelsfinale 15',home:'3-gruppe 1', away:'3-gruppe 2'},
    {id:'r32_16',stage:'r32', label:'Åttedelsfinale 16',home:'3-gruppe 3', away:'3-gruppe 4'},
    {id:'r16_1', stage:'r16', label:'Sekstendelsfinale 1', home:'Vinner R32-1', away:'Vinner R32-2'},
    {id:'r16_2', stage:'r16', label:'Sekstendelsfinale 2', home:'Vinner R32-3', away:'Vinner R32-4'},
    {id:'r16_3', stage:'r16', label:'Sekstendelsfinale 3', home:'Vinner R32-5', away:'Vinner R32-6'},
    {id:'r16_4', stage:'r16', label:'Sekstendelsfinale 4', home:'Vinner R32-7', away:'Vinner R32-8'},
    {id:'r16_5', stage:'r16', label:'Sekstendelsfinale 5', home:'Vinner R32-9', away:'Vinner R32-10'},
    {id:'r16_6', stage:'r16', label:'Sekstendelsfinale 6', home:'Vinner R32-11', away:'Vinner R32-12'},
    {id:'r16_7', stage:'r16', label:'Sekstendelsfinale 7', home:'Vinner R32-13', away:'Vinner R32-14'},
    {id:'r16_8', stage:'r16', label:'Sekstendelsfinale 8', home:'Vinner R32-15', away:'Vinner R32-16'},
    {id:'qf_1',  stage:'qf',  label:'Kvartfinale 1', home:'Vinner R16-1', away:'Vinner R16-2'},
    {id:'qf_2',  stage:'qf',  label:'Kvartfinale 2', home:'Vinner R16-3', away:'Vinner R16-4'},
    {id:'qf_3',  stage:'qf',  label:'Kvartfinale 3', home:'Vinner R16-5', away:'Vinner R16-6'},
    {id:'qf_4',  stage:'qf',  label:'Kvartfinale 4', home:'Vinner R16-7', away:'Vinner R16-8'},
    {id:'sf_1',  stage:'sf',  label:'Semifinale 1', home:'Vinner KF-1', away:'Vinner KF-2'},
    {id:'sf_2',  stage:'sf',  label:'Semifinale 2', home:'Vinner KF-3', away:'Vinner KF-4'},
    {id:'third', stage:'final',label:'Bronsekamp',   home:'Taper SF-1', away:'Taper SF-2'},
    {id:'final', stage:'final',label:'🏆 FINALE',    home:'Vinner SF-1', away:'Vinner SF-2'}
  ];
  ko.forEach(m => allMatches.push(m));
}

async function loadUserPredictions() {
  if (!currentUser) return {};
  if (firestoreOk) {
    try {
      const doc = await db.collection('predictions').doc(currentUser).get();
      return doc.exists ? doc.data() : {};
    } catch(e) { console.error(e); }
  }
  try { return JSON.parse(localStorage.getItem('vm26_'+currentUser)||'{}'); } catch(e) { return {}; }
}

async function saveUserPredictions(data) {
  if (!currentUser) return false;
  if (firestoreOk) {
    try {
      await db.collection('predictions').doc(currentUser).set(data, {merge:true});
      return true;
    } catch(e) { console.error(e); }
  }
  localStorage.setItem('vm26_'+currentUser, JSON.stringify(data));
  return true;
}

async function loadAllPredictions() {
  if (firestoreOk) {
    try {
      const snap = await db.collection('predictions').get();
      const res = {};
      snap.forEach(doc => { res[doc.id] = doc.data(); });
      return res;
    } catch(e) { console.error(e); }
  }
  const users = JSON.parse(localStorage.getItem('vm26_users')||'[]');
  const res = {};
  users.forEach(u => {
    try { res[u] = JSON.parse(localStorage.getItem('vm26_'+u)||'{}'); } catch(e) {}
  });
  return res;
}

async function loadAnswers() {
  if (firestoreOk) {
    try {
      const doc = await db.collection('admin').doc('answers').get();
      return doc.exists ? doc.data() : {};
    } catch(e) { console.error(e); }
  }
  try { return JSON.parse(localStorage.getItem('vm26_answers')||'{}'); } catch(e) { return {}; }
}

async function saveAnswers(data) {
  if (firestoreOk) {
    try { await db.collection('admin').doc('answers').set(data); return; } catch(e) { console.error(e); }
  }
  localStorage.setItem('vm26_answers', JSON.stringify(data));
}

function renderUserSection() {
  const sec = document.getElementById('user-section');
  const tabs = document.getElementById('main-tabs');
  const content = document.getElementById('tab-content');
  if (!currentUser) {
    tabs.style.display = 'none';
    const users = JSON.parse(localStorage.getItem('vm26_users')||'[]');
    sec.innerHTML = `
      <div class="new-user-form">
        <h3>👋 Hvem er du?</h3>
        <p style="font-size:13px;color:#888;margin-top:4px">Skriv inn navnet ditt for å starte tippingen</p>
        <div class="field">
          <input id="new-name" placeholder="Ditt navn..." autocomplete="name" />
          <button class="btn primary" onclick="addUser()">Start tipping →</button>
        </div>
        ${users.length ? `<div style="margin-top:14px;font-size:13px;color:#888">Tidligere deltakere: ${users.map(u=>`<a href="#" onclick="selectUser('${u}');return false" style="margin-right:10px;color:#1855a3;font-weight:500">${u}</a>`).join('')}</div>` : ''}
      </div>`;
    content.innerHTML = '';
  } else {
    tabs.style.display = 'flex';
    sec.innerHTML = `
      <div class="user-bar">
        <div class="avatar">${currentUser.substring(0,2).toUpperCase()}</div>
        <div style="flex:1"><strong>${currentUser}</strong><br><span style="font-size:12px;color:#888">Pålogget · ${firestoreOk ? '🟢 Synkronisert med alle' : '🟡 Demo-modus (lokalt)'}</span></div>
        <button class="btn" onclick="logout()" style="font-size:12px">Bytt bruker</button>
      </div>`;
    showTab(currentTab);
  }
}

function addUser() {
  const name = document.getElementById('new-name').value.trim();
  if (!name) { document.getElementById('new-name').focus(); return; }
  const users = JSON.parse(localStorage.getItem('vm26_users')||'[]');
  if (!users.includes(name)) { users.push(name); localStorage.setItem('vm26_users', JSON.stringify(users)); }
  selectUser(name);
}

function selectUser(name) {
  currentUser = name;
  renderUserSection();
}

function logout() {
  currentUser = null;
  currentTab = 'predictions';
  renderUserSection();
}

function showTab(id) {
  currentTab = id;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['predictions','matches','leaderboard','rules'][i]===id);
  });
  const c = document.getElementById('tab-content');
  if (id==='predictions') renderPredictionsTab(c);
  else if (id==='matches') renderMatchesTab(c);
  else if (id==='leaderboard') renderLeaderboardTab(c);
  else if (id==='rules') renderRulesTab(c);
}

async function renderPredictionsTab(c) {
  c.innerHTML = `<div class="card"><div style="text-align:center;padding:1rem"><span class="spinner"></span> Laster tips...</div></div>`;
  const saved = await loadUserPredictions();
  const special = saved.special || {};
  let html = `<div class="card"><h2>Spesielle spørsmål</h2><p style="font-size:13px;color:#888;margin-bottom:1rem">Her er de store poengsummene — tenk deg godt om!</p>`;
  SPECIAL_QS.forEach(q => {
    html += `<div class="q-item">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:14px;font-weight:500">${q.label}</span>
        <span class="q-pts">${q.pts} poeng</span>
      </div>
      <div class="q-input"><input id="sq_${q.id}" type="${q.type}" placeholder="${q.placeholder}" value="${special[q.id]||''}" /></div>
    </div>`;
  });
  html += `</div>`;
  html += `<div class="btn-row">
    <button class="btn primary" onclick="saveAll()">💾 Lagre alle tips</button>
    <button class="btn danger" onclick="confirmClear()">🗑 Nullstill</button>
  </div>`;
  c.innerHTML = html;
}

async function renderMatchesTab(c) {
  c.innerHTML = `<div class="card"><div style="text-align:center;padding:1rem"><span class="spinner"></span> Laster kamper...</div></div>`;
  const saved = await loadUserPredictions();
  const matches = saved.matches || {};

  let html = `<div class="btn-row">
    <button class="btn primary" onclick="randomizeAll()">🎲 Tilfeldig — alle kamper</button>
    <button class="btn" onclick="randomizeGroup()">🔄 Tilfeldig — gruppe:</button>
    <select id="group-select">${Object.keys(GROUPS).map(g=>`<option value="${g}">Gruppe ${g}</option>`).join('')}</select>
    <button class="btn success" onclick="saveAll()" style="margin-left:auto">💾 Lagre</button>
  </div>
  <div style="font-size:12px;color:#888;margin-bottom:1rem">Poenggiving: korrekt utfall = <strong>2 poeng</strong>, eksakt resultat = <strong>5 poeng</strong></div>`;

  html += `<div style="font-size:13px;font-weight:500;background:#f5f5f0;padding:8px 12px;border-radius:8px;margin-bottom:.75rem">Grupperunde</div>`;
  html += `<div class="group-grid">`;
  Object.entries(GROUPS).forEach(([g, teams]) => {
    html += `<div class="group-card"><div class="group-title">Gruppe ${g}</div>`;
    allMatches.filter(m=>m.stage==='group'&&m.group===g).forEach(m => {
      const v = matches[m.id] || ['',''];
      html += `<div class="match-row">
        <div class="team ${m.home==='Norge'?'norway':''}">${m.home}${m.home==='Norge'?'<span class="badge-norway">NOR</span>':''}</div>
        <div class="score-box">
          <input id="h_${m.id}" type="number" min="0" max="20" placeholder="-" value="${v[0]}" />
          <span class="sep">–</span>
          <input id="a_${m.id}" type="number" min="0" max="20" placeholder="-" value="${v[1]}" />
        </div>
        <div class="team ${m.away==='Norge'?'norway':''}">${m.away}${m.away==='Norge'?'<span class="badge-norway">NOR</span>':''}</div>
      </div>`;
    });
    html += `</div>`;
  });
  html += `</div>`;

  const stages = [
    {key:'r32',label:'Åttedelsfinaler (R32)'},
    {key:'r16',label:'Sekstendelsfinaler (R16)'},
    {key:'qf', label:'Kvartfinaler'},
    {key:'sf', label:'Semifinaler'},
    {key:'final',label:'Bronsekamp & Finale'}
  ];
  stages.forEach(s => {
    const ms = allMatches.filter(m=>m.stage===s.key);
    if (!ms.length) return;
    html += `<div class="stage-header">${s.label}</div><div class="ko-grid">`;
    ms.forEach(m => {
      const v = matches[m.id] || ['',''];
      html += `<div class="ko-match">
        <div class="ko-label">${m.label||''}</div>
        <div class="ko-teams">
          <div style="flex:1;font-size:12px">${m.home}</div>
          <div class="score-box">
            <input id="h_${m.id}" type="number" min="0" max="20" placeholder="-" value="${v[0]}" style="width:38px" />
            <span class="sep">–</span>
            <input id="a_${m.id}" type="number" min="0" max="20" placeholder="-" value="${v[1]}" style="width:38px" />
          </div>
          <div style="flex:1;text-align:right;font-size:12px">${m.away}</div>
        </div>
      </div>`;
    });
    html += `</div>`;
  });
  c.innerHTML = html;
}

async function renderLeaderboardTab(c) {
  c.innerHTML = `<div class="card"><div style="text-align:center;padding:1rem"><span class="spinner"></span> Beregner poeng...</div></div>`;
  const [allPreds, answers] = await Promise.all([loadAllPredictions(), loadAnswers()]);
  const users = Object.keys(allPreds);
  if (!users.length) {
    c.innerHTML = `<div class="notice">Ingen deltakere enda. Vær den første til å tippe!</div>`;
    return;
  }
  const scored = users.map(u => {
    const d = allPreds[u];
    let pts = 0; let breakdown = [];
    const sp = d.special||{}, an = answers.special||{};
    if (an.winner && sp.winner && an.winner.trim().toLowerCase()===sp.winner.trim().toLowerCase()) { pts+=200; breakdown.push('VM-vinner ✓ +200p'); }
    if (an.finalist && sp.finalist && an.finalist.trim().toLowerCase()===sp.finalist.trim().toLowerCase()) { pts+=100; breakdown.push('Finalist ✓ +100p'); }
    if (an.norway_first && sp.norway_first && an.norway_first.trim().toLowerCase()===sp.norway_first.trim().toLowerCase()) { pts+=100; breakdown.push('Norges 1. scorer ✓ +100p'); }
    if (an.norway_goals && sp.norway_goals && String(an.norway_goals).trim()===String(sp.norway_goals).trim()) { pts+=100; breakdown.push('Norges mål ✓ +100p'); }
    if (an.norway_top && sp.norway_top && an.norway_top.trim().toLowerCase()===sp.norway_top.trim().toLowerCase()) { pts+=50; breakdown.push('Toppscorer ✓ +50p'); }
    let correct=0, exact=0;
    if (answers.matches && d.matches) {
      Object.entries(answers.matches).forEach(([id,ah]) => {
        const ut = d.matches[id];
        if (!ut) return;
        if (ut[0]===ah[0]&&ut[1]===ah[1]) { pts+=5; exact++; }
        else if ((ut[0]>ut[1]&&ah[0]>ah[1])||(ut[0]<ut[1]&&ah[0]<ah[1])||(ut[0]===ut[1]&&ah[0]===ah[1])) { pts+=2; correct++; }
      });
    }
    if (exact||correct) breakdown.push(`Kamper: ${exact}×5p + ${correct}×2p`);
    const tipCount = d.matches ? Object.keys(d.matches).length : 0;
    return {name:u, pts, breakdown, tipCount};
  }).sort((a,b)=>b.pts-a.pts);

  const maxPts = Math.max(...scored.map(s=>s.pts), 1);
  const medals = ['🥇','🥈','🥉'];
  let html = `<div style="margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center">
    <h2 style="margin:0">Ledertavle</h2>
    <button class="btn" onclick="showTab('leaderboard')">🔄 Oppdater</button>
  </div>
  <div class="card">`;
  scored.forEach((s,i) => {
    html += `<div class="lb-row">
      <div class="lb-rank">${medals[i]||`${i+1}.`}</div>
      <div class="avatar">${s.name.substring(0,2).toUpperCase()}</div>
      <div style="flex:1">
        <div class="lb-name">${s.name}</div>
        <div class="lb-detail">${s.tipCount} kamper tipset${s.breakdown.length?' · '+s.breakdown.slice(0,3).join(', '):''}</div>
        <div class="pts-bar"><div class="pts-bar-fill" style="width:${Math.round(s.pts/maxPts*100)}%"></div></div>
      </div>
      <div class="lb-pts" style="padding-left:12px">${s.pts}p</div>
    </div>`;
  });
  html += `</div>`;
  html += `<div class="btn-row" style="justify-content:flex-end">
    <button class="btn danger" onclick="adminPanel()">🔐 Admin: sett fasit</button>
  </div>`;
  c.innerHTML = html;
}

function collectCurrentData() {
  const special = {};
  SPECIAL_QS.forEach(q => {
    const el = document.getElementById('sq_'+q.id);
    if (el) special[q.id] = el.value;
  });
  const matches = {};
  allMatches.forEach(m => {
    const h = document.getElementById('h_'+m.id);
    const a = document.getElementById('a_'+m.id);
    if (h && a && h.value!=='' && a.value!=='') matches[m.id] = [parseInt(h.value)||0, parseInt(a.value)||0];
  });
  return {special, matches};
}

async function saveAll() {
  if (!currentUser) { alert('Logg inn først!'); return; }
  const data = collectCurrentData();
  const ok = await saveUserPredictions(data);
  const count = Object.keys(data.matches).length;
  showToast(`✓ Lagret! ${count} kamper + spesielle spørsmål ${firestoreOk?'(synkronisert)':'(lokalt)'}`);
}

function confirmClear() {
  if (!confirm('Er du sikker? Dette sletter alle dine tips.')) return;
  saveUserPredictions({special:{}, matches:{}});
  showTab('predictions');
  showToast('Tips nullstilt');
}

function randomizeAll() {
  allMatches.forEach(m => {
    const h = document.getElementById('h_'+m.id);
    const a = document.getElementById('a_'+m.id);
    if (h) h.value = Math.floor(Math.random()*5);
    if (a) a.value = Math.floor(Math.random()*5);
  });
}

function randomizeGroup() {
  const g = document.getElementById('group-select').value;
  allMatches.filter(m=>m.group===g).forEach(m => {
    const h = document.getElementById('h_'+m.id);
    const a = document.getElementById('a_'+m.id);
    if (h) h.value = Math.floor(Math.random()*5);
    if (a) a.value = Math.floor(Math.random()*5);
  });
}

async function adminPanel() {
  const pw = prompt('Admin-passord (standard: vm2026):');
  if (pw !== 'vm2026') { alert('Feil passord!'); return; }
  const answers = await loadAnswers();
  const sp = answers.special || {};
  const winner       = prompt('VM-vinner:', sp.winner||'');           if(winner===null) return;
  const finalist     = prompt('VM-finalist (taper):', sp.finalist||''); if(finalist===null) return;
  const norway_first = prompt('Norges første målscorer:', sp.norway_first||''); if(norway_first===null) return;
  const norway_goals = prompt('Norges totale mål:', sp.norway_goals||''); if(norway_goals===null) return;
  const norway_top   = prompt('Norges toppscorer:', sp.norway_top||''); if(norway_top===null) return;
  const newAnswers = { special:{winner,finalist,norway_first,norway_goals,norway_top}, matches: answers.matches||{} };
  const addMatch = confirm('Vil du legge inn et kampresultat?');
  if (addMatch) {
    const id = prompt('Kamp-ID (se HTML-koden, f.eks. g_I_0_1 for Norges første gruppesp.kamp):');
    const score = prompt('Resultat (f.eks. 2-1):');
    if (id && score) {
      const parts = score.split('-').map(Number);
      if (parts.length===2) newAnswers.matches[id] = parts;
    }
  }
  await saveAnswers(newAnswers);
  showTab('leaderboard');
  showToast('✓ Fasit lagret!');
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 3200);
}

document.addEventListener('keydown', e => {
  if (e.key==='Enter' && document.getElementById('new-name')===document.activeElement) addUser();
});

genMatches();
initFirebase();
renderUserSection();
